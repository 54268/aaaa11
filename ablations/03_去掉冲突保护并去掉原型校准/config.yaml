project:
  name: ablation_no_conflict_no_prototype_calibration
  output_dir: ./03_去掉冲突保护并去掉原型校准

prep:
  kind: wisig_compact
  raw_path: ../data/raw/wisig/SingleDay.pkl
  split_file: ../data/splits/wisig/single_day_rx1_eq0/wisig_single_day_rx1_eq0_k16_u12_seed42.json
  processed_root: ../data/processed/wisig_singleday_osr_k16_u12
  train_ratio: 0.7
  val_ratio: 0.1
  deduplicate_exact: false

data:
  mode: separate_npz
  root: ../data/processed/wisig_singleday_osr_k16_u12
  batch_size: 128
  num_workers: 0
  signal_length: 256
  normalize: per_sample

model:
  backbone: cvcnn_iq
  embedding_dim: 128
  hidden_dim: 64
  dropout: 0.15
  temperature: 1.0

train:
  seed: 42
  device: auto
  epochs: 20
  lr: 0.001
  weight_decay: 0.0001
  prototype_momentum: 0.9

loss:
  lambda_basic: 1.0
  lambda_angle: 0.15
  lambda_prototype: 0.1
  angle_margin: 0.15
  lambda_proto_episode: 0.0
  proto_support: 2

boundary:
  k: 5
  alpha: 0.5
  top_m: 50
  ordinary_edge_ratio: 0.15

pseudo_unknown:
  ordinary_eta: 1.0
  critical_eta: 1.0
  critical_beta: 0.7
  ordinary_variations: 1
  critical_variations: 2
  jitter: 0.1
  enable_conflict_protection: false

openmax:
  backend: repo_openmax
  alpha_rank: 3
  tail_size: 25
  distance_type: eucl
  euclid_weight: 1.0

fusion:
  mode: linear
  lambda_grid: [1.0]
  threshold_grid: [0.25, 0.3, 0.35, 0.4, 0.45, 0.5, 0.55, 0.6, 0.65, 0.7, 0.75, 0.8, 0.85, 0.9, 0.92, 0.94, 0.96, 0.97, 0.98, 0.99]
  selection_weights:
    known_accuracy: 0.80
    unknown_recall: 0.05
    macro_f1: 0.10
    auroc: 0.05
  known_quantile_floor: 0.995
  min_known_accuracy: 0.99

eval:
  save_predictions: true

reporting:
  write_root_summaries: false
  write_figures_inside_output_dir: true

