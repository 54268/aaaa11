project:
  name: oracle_ablation_keep_conflict_protection_no_prototype_calibration
  output_dir: ./Oracle_04_保留冲突保护但去掉原型校准

prep:
  kind: oracle_sigmf
  raw_root: ../data/raw/oracle/KRI-16IQImbalances-DemodulatedData
  split_file: ../data/splits/oracle/oracle_main_sorted_k10_u6.json
  processed_root: ../data/processed/oracle_kri16_demod

data:
  mode: separate_npz
  root: ../data/processed/oracle_kri16_demod
  batch_size: 128
  num_workers: 0
  signal_length: 256
  normalize: per_sample

model:
  backbone: cvcnn_iq
  embedding_dim: 128
  hidden_dim: 64
  dropout: 0.15
  temperature: 1.0

train:
  seed: 42
  device: auto
  epochs: 20
  lr: 0.001
  weight_decay: 0.0001
  prototype_momentum: 0.9

loss:
  lambda_basic: 1.0
  lambda_angle: 0.15
  lambda_prototype: 0.1
  angle_margin: 0.15
  lambda_proto_episode: 0.0
  proto_support: 2

boundary:
  k: 5
  alpha: 0.5
  top_m: 50
  ordinary_edge_ratio: 0.15

pseudo_unknown:
  ordinary_eta: 1.0
  critical_eta: 1.15
  critical_beta: 0.7
  ordinary_variations: 2
  critical_variations: 3
  jitter: 0.1
  enable_conflict_protection: true

openmax:
  backend: repo_openmax
  alpha_rank: 3
  tail_size: 25
  distance_type: eucl
  euclid_weight: 1.0

fusion:
  mode: linear
  lambda_grid: [1.0]
  threshold_grid: [0.2, 0.25, 0.3, 0.35, 0.4, 0.45, 0.5, 0.55, 0.6, 0.65, 0.7, 0.75, 0.8, 0.85, 0.88, 0.9, 0.92, 0.94]
  selection_weights:
    known_accuracy: 0.45
    unknown_recall: 0.35
    macro_f1: 0.15
    auroc: 0.05
  known_quantile_floor: 0.95
  min_known_accuracy: 0.91

eval:
  save_predictions: true

reporting:
  write_root_summaries: false
  write_figures_inside_output_dir: true

