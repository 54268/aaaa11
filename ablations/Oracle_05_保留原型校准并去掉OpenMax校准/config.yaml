project:
  name: oracle_ablation_keep_prototype_calibration_remove_openmax
  output_dir: ./Oracle_05_保留原型校准并去掉OpenMax校准

prep:
  kind: oracle_sigmf
  raw_root: ../data/raw/oracle/KRI-16IQImbalances-DemodulatedData
  split_file: ../data/splits/oracle/oracle_main_sorted_k10_u6.json
  processed_root: ../data/processed/oracle_kri16_demod

data:
  mode: separate_npz
  root: ../data/processed/oracle_kri16_demod
  batch_size: 128
  num_workers: 0
  signal_length: 256
  normalize: per_sample

model:
  backbone: cvcnn_iq
  embedding_dim: 128
  hidden_dim: 64
  dropout: 0.15
  temperature: 1.0

train:
  seed: 42
  device: auto
  epochs: 20
  lr: 0.001
  weight_decay: 0.0001
  prototype_momentum: 0.9

loss:
  lambda_basic: 1.0
  lambda_angle: 0.15
  lambda_prototype: 0.1
  angle_margin: 0.15
  lambda_proto_episode: 0.0
  proto_support: 2

boundary:
  k: 5
  alpha: 0.5
  top_m: 50
  ordinary_edge_ratio: 0.15

pseudo_unknown:
  ordinary_eta: 1.0
  critical_eta: 1.15
  critical_beta: 0.7
  ordinary_variations: 2
  critical_variations: 3
  jitter: 0.1
  enable_conflict_protection: true

openmax:
  backend: repo_openmax
  alpha_rank: 3
  tail_size: 25
  distance_type: eucl
  euclid_weight: 1.0

fusion:
  mode: linear
  lambda_grid: [0.0]
  threshold_grid: [0.28, 0.3, 0.32, 0.34, 0.35, 0.36, 0.38, 0.4, 0.45, 0.5, 0.55, 0.6, 0.65, 0.7, 0.75, 0.78, 0.8, 0.82, 0.83, 0.84, 0.85, 0.86, 0.88]
  threshold_mode: classwise_balanced
  classwise_quantile_grid: [0.90, 0.93, 0.95, 0.97, 0.98, 0.99]
  classwise_known_weight: 0.45
  classwise_unknown_weight: 0.55
  classwise_min_known_accept: 0.88
  selection_weights:
    known_accuracy: 0.45
    unknown_recall: 0.35
    macro_f1: 0.15
    auroc: 0.05
  known_quantile_floor: 0.95
  min_known_accuracy: 0.91

eval:
  save_predictions: true

reporting:
  write_root_summaries: false
  write_figures_inside_output_dir: true

