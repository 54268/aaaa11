project:
  name: os_sei_mvp
  output_dir: ./outputs/demo_run

data:
  mode: synthetic
  root: ./data/separate_npz
  batch_size: 64
  num_workers: 0
  num_known_classes: 6
  num_unknown_classes: 3
  signal_length: 256
  train_per_class: 160
  val_per_class: 40
  test_known_per_class: 60
  test_unknown_per_class: 60
  synthetic_noise_std: 0.08

model:
  backbone: cvcnn_iq
  embedding_dim: 128
  hidden_dim: 16
  dropout: 0.2
  temperature: 1.0

train:
  seed: 42
  device: auto
  epochs: 20
  lr: 0.001
  weight_decay: 0.0001
  prototype_momentum: 0.9

loss:
  lambda_basic: 1.0
  lambda_angle: 0.2
  lambda_prototype: 0.15
  angle_margin: 0.2
  lambda_proto_episode: 0.0
  proto_support: 2

boundary:
  k: 5
  alpha: 0.5
  top_m: 8
  ordinary_edge_ratio: 0.15

pseudo_unknown:
  ordinary_eta: 1.0
  critical_eta: 1.0
  critical_beta: 0.7
  ordinary_variations: 1
  critical_variations: 2
  jitter: 0.1

openmax:
  backend: native
  alpha_rank: 3
  tail_size: 20
  distance_type: eucl
  euclid_weight: 1.0

fusion:
  lambda_grid: [0.0, 0.05, 0.1, 0.15, 0.2, 0.25, 0.3, 0.35, 0.4, 0.45, 0.5, 0.55, 0.6, 0.65, 0.7, 0.75, 0.8, 0.85, 0.9, 0.95, 1.0]
  threshold_grid: [0.05, 0.1, 0.15, 0.2, 0.25, 0.3, 0.35, 0.4, 0.45, 0.5, 0.55, 0.6, 0.65, 0.7, 0.75, 0.8, 0.85, 0.9, 0.95]
  selection_weights:
    oscr: 0.45
    known_accuracy: 0.35
    unknown_recall: 0.2

eval:
  save_predictions: true
